<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Panel{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <nav class="bg-slate-800 p-4 text-white flex justify-between shadow-lg">
        <div class="flex items-center gap-4">
            <span class="font-bold">Admin Panel</span>
            </div>
        
        <a href="{% url 'logout' %}" class="text-sm bg-red-500 px-3 py-1 rounded hover:bg-red-600 transition">
            Logout
        </a>
    </nav>

    <main class="p-8">
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
